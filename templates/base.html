<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Transformer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 2rem;
            text-align: center;
        }

        h1 {
            font-weight: 700;
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
            box-sizing: border-box;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4);
        }

        /* Buttons and Inputs */
        input[type="file"], input[type="text"], select, textarea {
            width: 100%;
            padding: 0.75rem;
            margin-top: 0.5rem;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
        }

        input[type="file"]:focus, input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background: var(--accent-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        /* Forms */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }
        
        .radio-group {
            display: flex;
            gap: 1.5rem;
            margin-top: 0.5rem;
        }

        /* Pills and Badges */
        .pill {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 500;
            background: rgba(255,255,255,0.1);
            margin: 0.25rem 0.25rem 0.25rem 0;
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-left: 0.5rem;
            vertical-align: middle;
        }

        /* Details / Summary */
        details {
            margin-top: 1.5rem;
            background: rgba(0,0,0,0.15);
            border-radius: 8px;
            padding: 0.5rem;
        }
        
        summary {
            cursor: pointer;
            font-weight: 600;
            padding: 0.5rem;
            color: var(--text-muted);
            transition: color 0.2s ease;
        }

        summary:hover {
            color: var(--text-main);
        }

        pre {
            background: rgba(0,0,0,0.3);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.9rem;
            color: #cbd5e1;
            margin-top: 0.5rem;
            white-space: pre-wrap;
        }

        /* Colors for confidence */
        .conf-high { color: var(--success); font-weight: bold; }
        .conf-med { color: var(--warning); font-weight: bold; }
        .conf-low { color: var(--danger); font-weight: bold; }
        
        /* Grid for results */
        .candidates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        
        /* Header Search */
        .search-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .search-bar input {
            margin-top: 0;
            flex: 1;
        }
    </style>
</head>
<body>
    <header>
        <h1>Candidate Transformer</h1>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    
    <script>
        function toggleConfig() {
            var schemaType = document.querySelector('input[name="schema_type"]:checked').value;
            var customConfigDiv = document.getElementById('custom-config-group');
            if (schemaType === 'custom') {
                customConfigDiv.style.display = 'block';
            } else {
                customConfigDiv.style.display = 'none';
            }
        }
    </script>
</body>
</html>
