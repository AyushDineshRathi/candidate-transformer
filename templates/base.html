<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Transformer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --bg-gradient: linear-gradient(135deg, #020617 0%, #1e1b4b 50%, #0f172a 100%);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-gradient);
            background-size: 200% 200%;
            animation: gradientShift 15s ease infinite;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            box-sizing: border-box;
        }

        h1 {
            font-weight: 800;
            font-size: 1.8rem;
            margin: 0;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        
        header nav {
            display: flex;
            gap: 1rem;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
            box-sizing: border-box;
            flex-grow: 1;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        /* Buttons and Inputs */
        input[type="file"], input[type="text"], input[type="url"], select, textarea {
            width: 100%;
            padding: 0.875rem;
            margin-top: 0.5rem;
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }
        
        input::file-selector-button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            margin-right: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        input::file-selector-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: rgba(0,0,0,0.4);
        }

        button, .btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 0.875rem 1.75rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        button:hover, .btn:hover {
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
        }

        button:active, .btn:active {
            transform: translateY(0);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }
        
        .btn-danger:hover {
            background: linear-gradient(135deg, #f87171, #ef4444);
            box-shadow: 0 6px 16px rgba(220, 38, 38, 0.4);
        }

        /* Forms */
        .form-group {
            margin-bottom: 1.75rem;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #cbd5e1;
            font-size: 0.95rem;
        }
        
        .radio-group {
            display: flex;
            gap: 1.5rem;
            margin-top: 0.5rem;
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
        }

        /* Pills and Badges */
        .pill {
            display: inline-block;
            padding: 0.35rem 0.85rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            background: rgba(255,255,255,0.08);
            margin: 0.35rem 0.35rem 0.35rem 0;
            border: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
        }
        
        .pill:hover {
            background: rgba(255,255,255,0.15);
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.4);
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-left: 0.5rem;
            vertical-align: middle;
            letter-spacing: 0.5px;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.2);
        }

        /* Details / Summary */
        details {
            margin-top: 1.5rem;
            background: rgba(0,0,0,0.25);
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        summary {
            cursor: pointer;
            font-weight: 600;
            padding: 1rem;
            color: var(--text-muted);
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.02);
            list-style: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        summary::-webkit-details-marker {
            display: none;
        }
        
        summary::after {
            content: "+";
            font-size: 1.2rem;
            font-weight: 400;
        }
        
        details[open] summary::after {
            content: "−";
        }

        summary:hover {
            color: var(--text-main);
            background: rgba(255,255,255,0.05);
        }

        pre {
            background: #020617;
            padding: 1.5rem;
            margin: 0;
            overflow-x: auto;
            font-size: 0.9rem;
            color: #a78bfa;
            white-space: pre-wrap;
            border-top: 1px solid var(--glass-border);
            line-height: 1.5;
        }

        /* Colors for confidence */
        .conf-high { color: #34d399; font-weight: 700; }
        .conf-med { color: #fbbf24; font-weight: 700; }
        .conf-low { color: #f87171; font-weight: 700; }
        
        /* Grid for results */
        .candidates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 2rem;
            margin-top: 2.5rem;
        }
        
        /* Header Search */
        .search-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .search-bar input {
            margin-top: 0;
            flex: 1;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            border-radius: 12px;
        }
        
        /* Titles */
        h2 {
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.75rem;
            letter-spacing: -0.5px;
        }
        
        h3 {
            margin-top: 0;
            font-size: 1.4rem;
            color: #e2e8f0;
        }
    </style>
</head>
<body>
    <header>
        <a href="/" style="text-decoration: none;">
            <h1>Candidate Transformer</h1>
        </a>
        <nav>
            <form action="/clear_db" method="post" style="margin:0;">
                <button type="submit" class="btn btn-danger" onclick="return confirm('Are you sure you want to clear the entire candidate database?');">
                    Clear Database & Reset
                </button>
            </form>
        </nav>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    
    <script>
        function toggleConfig() {
            var schemaType = document.querySelector('input[name="schema_type"]:checked').value;
            var customConfigDiv = document.getElementById('custom-config-group');
            if (schemaType === 'custom') {
                customConfigDiv.style.display = 'block';
            } else {
                customConfigDiv.style.display = 'none';
            }
        }
    </script>
</body>
</html>
