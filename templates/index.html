{% extends "base.html" %}
{% block content %}
<div class="glass-card" style="max-width: 600px; margin: 0 auto;">
    <h2 style="margin-top: 0;">Run Pipeline</h2>
    <form action="/run" method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label class="form-label" for="csv_file">Recruiter CSV (Required)</label>
            <input type="file" id="csv_file" name="csv_file" accept=".csv" required>
        </div>
        
        <div class="form-group">
            <label class="form-label" for="ats_file">ATS JSON (Optional)</label>
            <input type="file" id="ats_file" name="ats_file" accept=".json">
        </div>
        
        <div class="form-group">
            <label class="form-label">Schema Configuration</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="schema_type" value="default" checked onchange="toggleConfig()"> 
                    Default Schema
                </label>
                <label>
                    <input type="radio" name="schema_type" value="custom" onchange="toggleConfig()"> 
                    Custom Config JSON
                </label>
            </div>
        </div>
        
        <div class="form-group" id="custom-config-group" style="display: none;">
            <label class="form-label" for="custom_config">Custom Config JSON</label>
            <textarea id="custom_config" name="custom_config" rows="6" placeholder='{"mappings": [...]}'></textarea>
        </div>
        
        <button type="submit" style="width: 100%;">Run Pipeline</button>
    </form>
</div>
{% endblock %}
